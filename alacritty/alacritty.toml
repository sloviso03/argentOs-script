[general]
live_config_reload = true

[window]
decorations = "None"
opacity = 0.92
startup_mode = "Windowed"
dynamic_title = true
padding.x = 20
padding.y = 18

[font]
size = 12

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[cursor]
style = "Beam"
blink_interval = 500

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

[colors.primary]
background = "#000000"
foreground = "#e8e8e8"

[colors.cursor]
text = "#000000"
cursor = "#ffffff"

[colors.selection]
text = "#ffffff"
background = "#1a1a1a"

[colors.normal]
black = "#111111"
red = "#d16969"
green = "#98c379"
yellow = "#d7ba7d"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
white = "#c8c8c8"

[colors.bright]
black = "#333333"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
white = "#ffffff"

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "Plus", mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
  { key = "Key0", mods = "Control", action = "ResetFontSize" }
]
